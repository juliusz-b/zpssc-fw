name: testy

on: [push, pull_request]

jobs:
  unit-tests:
    name: Testy jednostkowe (host gcc)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Wersje narzedzi
        run: gcc --version && make --version
      - name: make test
        run: make test
